name: Build
on:
  push:
    branches:
      - main
    paths:
      - Dockerfile
      - .github/workflows/build.yaml
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: cusanity/koreader
jobs:
  build-and-push-image:
    if: "!contains(github.event.head_commit.message, 'curl')"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      actions: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Get Koreader version
        id: koreader_version
        run: echo "version=$(grep -oP '(?<=ARG KOREADER_URL=).+' Dockerfile | grep -oP 'v[0-9]+\.[0-9]+(-[0-9]+-g[a-f0-9]+)?' | head -1)" >> $GITHUB_OUTPUT
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{ is_default_branch }}
            type=raw,value=${{ steps.koreader_version.outputs.version }}
      - name: Build and push Docker image
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          LABELS: ${{ steps.meta.outputs.labels }}
        run: |
          mapfile -t tag_args < <(awk 'NF{print "-t"; print}' <<< "$TAGS")
          mapfile -t label_args < <(awk 'NF{print "--label"; print}' <<< "$LABELS")
          for attempt in 1 2 3; do
            echo "::group::Build attempt $attempt/3"
            docker buildx build \
              --platform linux/arm64 \
              --push \
              --cache-from type=gha \
              --cache-to "type=gha,mode=max" \
              "${tag_args[@]}" \
              "${label_args[@]}" \
              . && { echo "::endgroup::"; exit 0; }
            echo "::endgroup::"
            [[ $attempt -lt 3 ]] && { echo "Attempt $attempt failed, retrying in $((attempt * 30))s..."; sleep $((attempt * 30)); }
          done
          echo "Build failed after 3 attempts"; exit 1
